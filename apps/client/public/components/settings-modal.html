<div class="settings-modal hidden" id="settingsModal">
    <div class="settings-modal-overlay" id="settingsModalOverlay"></div>
    <div class="settings-modal-container">
        <div class="settings-modal-header">
            <button class="settings-modal-close" id="settingsModalClose" type="button" aria-label="Fermer">
                <i class="fas fa-times"></i>
            </button>
            <h2 class="settings-modal-title"><i class="fas fa-gear"></i> Paramètres</h2>
        </div>
        <div class="settings-modal-body">
            <section class="settings-update-card" aria-labelledby="settingsUpdateHeading">
                <header class="settings-update-card__header">
                    <div class="settings-update-card__icon" aria-hidden="true">
                        <i class="fa-solid fa-cloud-arrow-down"></i>
                    </div>
                    <div class="settings-update-card__titles">
                        <h3 id="settingsUpdateHeading">Mise à jour</h3>
                        <p class="settings-update-card__subtitle">Vérifiez et installez la dernière version de Workspace.</p>
                    </div>
                </header>

                <div class="settings-update-status-block">
                    <span class="settings-update-status-label">État</span>
                    <div class="settings-update-status" id="settingsUpdateStatus">Vérification…</div>
                </div>

                <div class="settings-update-actions">
                    <button type="button" id="settingsBtnCheckUpdate" class="settings-btn settings-btn--ghost">
                        <i class="fa-solid fa-arrows-rotate" aria-hidden="true"></i> Vérifier
                    </button>
                    <button type="button" id="settingsBtnDownloadUpdate" class="settings-btn settings-btn--primary hidden" disabled>
                        <i class="fa-solid fa-download" aria-hidden="true"></i> Télécharger &amp; préparer
                    </button>
                </div>

                <div class="settings-update-progress hidden" id="settingsUpdateProgress">
                    <div class="settings-update-progress-bar">
                        <div class="settings-update-progress-fill" id="settingsUpdateProgressFill" style="width:0%"></div>
                    </div>
                    <div class="settings-update-progress-text" id="settingsUpdateProgressText">0%</div>
                </div>

                <div class="settings-update-hint hidden" id="settingsUpdateHint">
                    <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
                    <span>Mise à jour téléchargée. <strong>Redémarrez l’application</strong> pour l’appliquer.</span>
                </div>
                <div class="settings-error hidden" id="settingsUpdateError"></div>
            </section>
        </div>
    </div>
</div>
