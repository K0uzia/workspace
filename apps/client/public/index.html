<!DOCTYPE html>
<html lang="fr" data-theme-dark="1">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        try {
            var t = localStorage.getItem('workspace_theme_dark');
            document.documentElement.setAttribute('data-theme-dark', t === '0' ? '0' : '1');
        } catch (e) {}
    </script>
    <link rel="stylesheet" href="./assets/css/global.css">
    <!-- Font Awesome Icons (Local - Electron Compatible) -->
    <link rel="stylesheet" href="./assets/css/fontawesome-local.css">
    <title>Workspace By Sandersonn</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https: http:; connect-src 'self' http: https: ws: wss:;">
</head>

<body>
    <!-- HEADER -->
    <header id="header"></header>

    <!-- AUTH MODAL (JWT silencieux si token déjà présent — pas d'UI compte) -->
    <div id="authModalContainer"></div>
    <!-- SETTINGS MODAL (thème / mises à jour) -->
    <div id="settingsModalContainer"></div>

    <!-- CONTENU PRINCIPAL (où les pages se chargeront) -->
    <main id="content">
        <!-- Les pages HTML s'afficheront ici -->
    </main>

    <!-- FOOTER -->
    <footer id="footer"></footer>

    <!-- SCRIPT PRINCIPAL -->
    <script type="module" src="./assets/js/global.js"></script>
    <script src="./app.js"></script>
</body>
